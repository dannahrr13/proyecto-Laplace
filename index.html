<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laplace Game</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div id="pantalla-inicio" class="pantalla">
        <h1>Laplace Game</h1>
        <button id="btn-facil">Nivel Fácil</button>
        <button id="btn-medio">Nivel Medio</button>
        <button id="btn-dificil">Nivel Difícil</button>
    </div>

    <div id="pantalla-juego" class="pantalla" style="display:none;">
        <h2 id="ecuacion"></h2>
        <div id="opciones"></div>

        <p>Puntos: <span id="puntos">0</span></p>
        <p>Tiempo: <span id="tiempo">60</span></p>
        <p>Vidas: <span id="vidas">3</span></p>
    </div>

    <div id="pantalla-final" class="pantalla" style="display:none;">
        <h2>Juego terminado</h2>
        <p>Puntuación final: <span id="puntuacion-final"></span></p>
        <button id="btn-reiniciar">Jugar otra vez</button>
    </div>

    <script src="js/juego.js"></script>
</body>
</html>
