<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laplace Game</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">
<link rel="stylesheet" href="css/animaciones.css">

</head>

<body>

<div id="pantalla-inicio" class="pantalla inicio">
    <div class="contenedor-juego">
        <p class="mini">LAPLACE GAME</p>

        <h1 class="titulo">
            <span class="rosa">LAPLACE</span>
            <span class="azul">GAME</span>
        </h1>

        <p class="descripcion">
            Demuestra tus habilidades ⚡
        </p>

        <button id="btn-jugar" class="btn-start">START!</button>
        <button id="btn-instrucciones" class="btn-start">INSTRUCCIONES</button>
    </div>
</div>

<div id="pantalla-instrucciones" class="pantalla oculto">
    <div class="card">
        <h2>Instrucciones</h2>
        <p>
        Elige la respuesta correcta.<br>
        Cada acierto suma puntos.<br>
        Si fallas pierdes vida.<br>
        ¡Consigue el mejor score!
        </p>
        <button id="btn-volver">VOLVER</button>
    </div>
</div>

<div id="pantalla-niveles" class="pantalla oculto">
    <div class="card">
        <h2>Nivel</h2>
        <button id="btn-facil">FÁCIL</button>
        <button id="btn-medio">MEDIO</button>
        <button id="btn-dificil">DIFÍCIL</button>
    </div>
</div>

<div id="pantalla-juego" class="pantalla oculto">
    <div class="card">

        <h2 id="ecuacion"></h2>

        <div class="barra">
            <div id="barra-tiempo"></div>
        </div>

        <div id="opciones"></div>

        <p>Puntos: <span id="puntos">0</span></p>
        <p>Tiempo: <span id="tiempo">60</span></p>
        <p>Vidas: <span id="vidas">3</span></p>

    </div>
</div>

<div id="pantalla-final" class="pantalla oculto">
    <div class="card">
        <h2>Game Over</h2>
        <p>Puntuación: <span id="puntuacion-final"></span></p>
        <button id="btn-reiniciar">REINICIAR</button>
    </div>
</div>

<audio id="musica" loop src="audio/musica.mp3"></audio>
<audio id="correcto-sound" src="audio/correcto.mp3"></audio>
<audio id="error-sound" src="audio/error.mp3"></audio>

<script src="js/juego.js"></script>

</body>
</html>
