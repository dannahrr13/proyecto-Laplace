<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laplace Game</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<div id="pantalla-inicio" class="pantalla inicio">
    <div class="contenedor-juego">

        <h1 class="titulo">Laplace Game</h1>

        <p class="descripcion">Resuelve transformadas y demuestra tu nivel ✨</p>

        <input id="nombre" placeholder="Ingresa tu nombre">

        <button id="btn-jugar">JUGAR</button>
        <button id="btn-instrucciones">INSTRUCCIONES</button>

    </div>
</div>

<div id="pantalla-instrucciones" class="pantalla oculto">
    <div class="card">
        <h2>Instrucciones</h2>
        <p>
        Responde correctamente<br>
        Cada acierto suma puntos<br>
        Si fallas pierdes vida<br>
        Gana antes de que acabe el tiempo
        </p>
        <button id="btn-volver">VOLVER</button>
    </div>
</div>

<div id="pantalla-niveles" class="pantalla oculto">
    <div class="card">
        <h2>Selecciona nivel</h2>
        <button id="btn-facil">FÁCIL</button>
        <button id="btn-medio">MEDIO</button>
        <button id="btn-dificil">DIFÍCIL</button>
    </div>
</div>

<div id="pantalla-juego" class="pantalla oculto">
    <div class="card">

        <div class="hud">
            <span>Puntos: <span id="puntos">0</span></span>
            <span>Tiempo: <span id="tiempo">60</span></span>
            <span>Vidas: <span id="vidas">3</span></span>
        </div>

        <div class="barra">
            <div id="barra-tiempo"></div>
        </div>

        <h2 id="ecuacion"></h2>

        <div id="opciones"></div>

    </div>
</div>

<div id="pantalla-final" class="pantalla oculto">
    <div class="card">

        <h2 id="resultado"></h2>

        <p>Puntuación: <span id="puntuacion-final"></span></p>

        <h3>🏆 Ranking</h3>
        <ul id="ranking"></ul>

        <button id="btn-limpiar">BORRAR RANKING</button>
        <button id="btn-reiniciar">REINICIAR</button>

    </div>
</div>

<script src="js/juego.js"></script>

</body>
</html>
