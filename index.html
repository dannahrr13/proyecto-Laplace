<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laplace Game</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<div id="pantalla-inicio" class="pantalla inicio">
    <div class="contenedor-juego">
        <p class="mini">LAPLACE GAME</p>

        <h1 class="titulo">
            <span class="rosa">LAPLACE</span>
            <span class="azul">GAME</span>
        </h1>

        <p class="descripcion">
            Demuestra tus habilidades resolviendo ecuaciones ⚡
        </p>

        <input id="nombre" placeholder="Tu nombre">

        <button id="btn-jugar">START</button>
        <button id="btn-instrucciones">INSTRUCCIONES</button>
    </div>
</div>

<div id="pantalla-instrucciones" class="pantalla oculto">
    <div class="card">
        <h2>Instrucciones</h2>
        <p>
        Elige la respuesta correcta<br>
        Gana puntos y evita perder vidas<br>
        Tienes tiempo limitado
        </p>
        <button id="btn-volver">VOLVER</button>
    </div>
</div>

<div id="pantalla-niveles" class="pantalla oculto">
    <div class="card">
        <h2>Nivel</h2>
        <button id="btn-facil">FACIL</button>
        <button id="btn-medio">MEDIO</button>
        <button id="btn-dificil">DIFICIL</button>
    </div>
</div>

<div id="pantalla-juego" class="pantalla oculto">
    <div class="card">

        <div class="hud">
            <span>Puntos: <span id="puntos">0</span></span>
            <span>Tiempo: <span id="tiempo">60</span></span>
            <span>Vidas: <span id="vidas">3</span></span>
        </div>

        <div class="barra">
            <div id="barra-tiempo"></div>
        </div>

        <h2 id="ecuacion"></h2>

        <div id="opciones"></div>

    </div>
</div>

<div id="pantalla-final" class="pantalla oculto">
    <div class="card">
        <h2 id="resultado">Juego terminado</h2>

        <p>Puntuación: <span id="puntuacion-final"></span></p>

        <h3>🏆 Ranking</h3>
        <ul id="ranking"></ul>

        <button id="btn-reiniciar">REINICIAR</button>
    </div>
</div>

<script src="js/juego.js"></script>

</body>
</html>
